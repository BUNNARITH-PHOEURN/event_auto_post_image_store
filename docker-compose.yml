version: "3.9"

services:
  app:
    build:
      context: .
    container_name: laravel_app
    volumes:
      - .:/var/www
    working_dir: /var/www
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel: