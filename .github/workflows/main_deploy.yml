# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Laravel to Azure Web App - bunnarith

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Install De
        if: steps.check_files.outputs.files_exists == 'true'
        RUN:
          php --version
          composer config "https-basic.nova.laravel.com" "${{secrets.NOVA_USER}}" "${{secrets.NOVA_TOKEN}}"

      - name: Run composer install if composer.json exists
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress

      - name: Run composer install if composer.json exists
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress


      - name: Zip the application files
        run: zip -r php-app.zip ./*

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app
      - name: Unzip artifact
        run: unzip php-app.zip
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.C~T8Q~-bTirA-dstAJ2nOjdeEoFmRLlJjpLqYa-z }}
          tenant-id: ${{ secrets.f2ab32f0-02ab-43dd-9dc3-c1e6dd7a3354}}
          subscription-id: ${{ secrets.f6af6976-be0f-40dc-b1c8-eb834bc96465 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'bunnarith'
          slot-name: 'Production'
          package: .